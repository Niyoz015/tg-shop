<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Do'kon</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <span class="logo">🛍 ShopBot</span>
      <button class="cart-btn" id="cartBtn" onclick="openCart()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" id="cartCount" style="display:none">0</span>
      </button>
    </div>
  </header>

  <div class="categories" id="categories"></div>

  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="Mahsulot qidirish..." oninput="filterProducts()">
  </div>

  <main class="products-grid" id="productsGrid"></main>

  <!-- Cart Modal -->
  <div class="modal-overlay" id="cartModal" onclick="if(event.target===this)closeCart()">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Savat</span>
        <button class="modal-close" onclick="closeCart()">✕</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer" id="cartFooter" style="display:none">
        <div class="cart-total">
          Jami: <strong id="cartTotal">0</strong> so'm
        </div>
        <button class="btn-order" id="orderBtn" onclick="placeOrder()">
          Buyurtma berish
        </button>
      </div>
      <div class="cart-empty" id="cartEmpty">
        <p>🛒 Savat bo'sh</p>
      </div>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
    <div class="modal modal-detail">
      <button class="modal-close detail-close" onclick="closeDetail()">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
