<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LELIT HOME</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain"></div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <img src="https://i.ibb.co/d4MZ5pDh/IMG-0668.png"
           alt="LELIT HOME"
           class="header-logo-img">
      <button class="cart-btn" id="cartBtn" onclick="openCart()" aria-label="Savat">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-count" id="cartCount" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-logo-wrap">
      <img src="https://i.ibb.co/d4MZ5pDh/IMG-0668.png"
           alt="LELIT HOME Premium Bed Linen"
           class="hero-logo-img">
    </div>
    <p class="hero-desc">Yuqori sifatli postel to'plamlari bilan<br>uyingizga hashamat va qulaylik olib keling</p>
  </div>

  <div class="categories" id="categories"></div>
  <div class="search-wrap">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Mahsulot qidirish..." oninput="filterProducts()">
  </div>
  <main class="products-grid" id="productsGrid"></main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="scrollToTop()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      <span>Bosh sahifa</span>
    </button>
    <button class="nav-item" onclick="openMyOrders()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <span>Buyurtmalar</span>
    </button>
    <button class="nav-item" onclick="openCart()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span>Savat</span>
    </button>
  </nav>

  <!-- Cart Modal -->
  <div class="modal-overlay" id="cartModal" onclick="if(event.target===this)closeCart()">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Savat</span>
        <button class="modal-close" onclick="closeCart()">✕</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer" id="cartFooter" style="display:none">
        <div id="cartTotal"></div>
        <button class="btn-order" id="orderBtn" onclick="placeOrder()">Buyurtma berish</button>
      </div>
      <div class="cart-empty" id="cartEmpty">
        <div class="empty-icon">◻</div>
        <p>Savat bo'sh</p>
      </div>
    </div>
  </div>

  <!-- Orders Modal -->
  <div class="modal-overlay" id="ordersModal" onclick="if(event.target===this)closeMyOrders()">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Buyurtmalarim</span>
        <button class="modal-close" onclick="closeMyOrders()">✕</button>
      </div>
      <div id="ordersContent"></div>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
    <div class="modal modal-detail">
      <button class="modal-close detail-close" onclick="closeDetail()">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
